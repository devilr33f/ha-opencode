name: mirror to github

on:
  push:
    branches: ['**']
    tags: ['**']
  delete:
  workflow_dispatch:

concurrency:
  group: mirror-github
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: docker
    container:
      image: alpine:latest
    steps:
      - name: install git
        run: apk add --no-cache git

      - name: clone source (mirror)
        env:
          SRC_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          set -eu
          if [ -n "${SRC_TOKEN:-}" ]; then
            auth_url="$(printf '%s' "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git" | sed -E 's#^(https?://)#\1x-access-token:'"${SRC_TOKEN}"'@#')"
          else
            auth_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          fi
          git clone --mirror "$auth_url" repo.git

      - name: push to github
        env:
          GH_USERNAME: ${{ secrets.GH_MIRROR_USERNAME }}
          GH_TOKEN: ${{ secrets.GH_MIRROR_TOKEN }}
        run: |
          set -eu
          : "${GH_USERNAME:?GH_MIRROR_USERNAME secret missing}"
          : "${GH_TOKEN:?GH_MIRROR_TOKEN secret missing}"
          cd repo.git
          git remote set-url --push origin "https://${GH_USERNAME}:${GH_TOKEN}@github.com/devilr33f/ha-opencode.git"
          git push --mirror
